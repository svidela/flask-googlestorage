[tox]
envlist = lint,py{39,310,311,312}

[testenv]
deps = 
    pytest>=8.4.2
    pytest-cov>=7.1.0
    pytest-datadir>=1.3.1
    filetype>=1.2.0
commands =
    pytest --cov=flask_googlestorage --cov-report=xml {posargs}

[testenv:lint]
deps = flake8>=7.3.0
skip_install = True
commands =
    flake8 flask_googlestorage tests --max-line-length=100 --max-complexity 10