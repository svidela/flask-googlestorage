[tox]
envlist = lint,py{310,311,312,313,314}

[testenv]
deps = 
    pytest>=9.1.1
    pytest-cov>=7.1.0
    pytest-datadir>=1.8.0
    filetype>=1.2.0
commands =
    pytest --cov=flask_googlestorage --cov-report=xml {posargs}

[testenv:lint]
deps = flake8>=7.3.0
skip_install = True
commands =
    flake8 flask_googlestorage tests --max-line-length=100 --max-complexity 10